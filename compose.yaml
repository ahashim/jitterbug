services:
  redis:
    image: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  loadgen:
    build:
      context: .
      dockerfile: Dockerfile.loadgen
    depends_on:
      - web

  victoriametrics:
    image: victoriametrics/victoria-metrics
    ports:
      - "8428:8428"
    volumes:
      - vmdata:/victoria-metrics-data
    command:
      - "--promscrape.config=/etc/prometheus.yaml"
      - "--httpListenAddr=:8428"
    configs:
      - source: prometheus
        target: /etc/prometheus.yaml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/jitterbug.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - victoriametrics

configs:
  prometheus:
    file: ./prometheus.yaml

volumes:
  vmdata:
